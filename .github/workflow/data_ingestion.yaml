name: Atualização de Dados Brasileirão 2026

on: 
  schedule:
    # Roda todos os dias meia noite
    - cron: '0 0 * * *'
  workflow_dispatch: # Permite rodar manualmente pelo GitHub

jobs:
  ingest:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout do código
        uses: actions/checkout@v4
      
      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Instalar dependências
        run: |
          pip install psycopg2-binary requests python-dotenv
      
      - name: Rodar script de ingestão
        env:
          FOOTBALL_API_KEY: ${{ secrets.FOOTBALL_API_KEY }}
          DB_CONNECTION_STRING: ${{ secrets.DB_CONNECTION_STRING}}
        
        run: python import_matches.py